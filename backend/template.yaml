AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: LifeLedger FastAPI backend running on AWS Lambda with local or DynamoDB persistence.

Parameters:
  AppEnv:
    Type: String
    Default: local
    AllowedValues:
      - local
      - production
  AuthMode:
    Type: String
    Default: local
    AllowedValues:
      - local
      - cognito
  LocalDevUserId:
    Type: String
    Default: local-dev-user
  PersistenceMode:
    Type: String
    Default: local
    AllowedValues:
      - local
      - dynamodb
  RemindersTableName:
    Type: String
    Default: lifeledger-reminders-auth
  PreferencesTableName:
    Type: String
    Default: lifeledger-preferences-auth
  CorsAllowedOrigins:
    Type: String
    Default: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,https://lifeledger.jpreinold.com,https://www.lifeledger.jpreinold.com

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 512

Resources:
  LifeLedgerUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true

  LifeLedgerUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-web-client"
      UserPoolId: !Ref LifeLedgerUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO

  LifeLedgerHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref CorsAllowedOrigins]
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowCredentials: true
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${LifeLedgerUserPool}"
              audience:
                - !Ref LifeLedgerUserPoolClient

  LifeLedgerApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      CodeUri: .
      Handler: lambda_handler.handler
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          AUTH_MODE: !Ref AuthMode
          LOCAL_DEV_USER_ID: !Ref LocalDevUserId
          PERSISTENCE_MODE: !Ref PersistenceMode
          REMINDERS_TABLE_NAME: !Ref RemindersTable
          PREFERENCES_TABLE_NAME: !Ref PreferencesTable
          LOCAL_DATA_FILE: /tmp/lifeledger-reminders.json
          LOCAL_PREFERENCES_FILE: /tmp/lifeledger-preferences.json
          CORS_ALLOWED_ORIGINS: !Ref CorsAllowedOrigins
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RemindersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PreferencesTable
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE
        OptionsProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /{proxy+}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /{proxy+}
            Method: ANY

  RemindersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref RemindersTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: id
          KeyType: RANGE

  PreferencesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref PreferencesTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: HTTP API endpoint for the LifeLedger backend.
    Value: !Sub "https://${LifeLedgerHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  RemindersTable:
    Description: DynamoDB reminders table name.
    Value: !Ref RemindersTable
  PreferencesTable:
    Description: DynamoDB user preferences table name.
    Value: !Ref PreferencesTable
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !Ref LifeLedgerUserPool
  UserPoolClientId:
    Description: Cognito User Pool app client ID for the frontend.
    Value: !Ref LifeLedgerUserPoolClient
