AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: LifeLedger FastAPI backend with fail-closed production defaults and explicit local overrides.

Parameters:
  AppEnv:
    Type: String
    Default: production
    AllowedValues:
      - local
      - production
  AuthMode:
    Type: String
    Default: cognito
    AllowedValues:
      - local
      - cognito
  LocalDevUserId:
    Type: String
    Default: local-dev-user
  PersistenceMode:
    Type: String
    Default: dynamodb
    AllowedValues:
      - local
      - dynamodb
  RemindersTableName:
    Type: String
    Default: lifeledger-reminders-auth
  RecordsTableName:
    Type: String
    Default: lifeledger-records-auth
  PreferencesTableName:
    Type: String
    Default: lifeledger-preferences-auth
  PushSubscriptionsTableName:
    Type: String
    Default: lifeledger-push-subscriptions-auth
  GoogleCalendarConnectionsTableName:
    Type: String
    Default: lifeledger-google-calendar-connections-auth
  GoogleOAuthStatesTableName:
    Type: String
    Default: lifeledger-google-oauth-states-auth
  RecordAttachmentsTableName:
    Type: String
    Default: lifeledger-record-attachments-auth
  LinkedItemsTableName:
    Type: String
    Default: lifeledger-linked-items-auth
  SearchIndexTableName:
    Type: String
    Default: lifeledger-search-index-auth
  SavedViewsTableName:
    Type: String
    Default: lifeledger-saved-views-auth
  ResponsibilityHistoryTableName:
    Type: String
    Default: lifeledger-responsibility-history-auth
  ReconciliationTableName:
    Type: String
    Default: lifeledger-reconciliation-auth
  AccountOperationsTableName:
    Type: String
    Default: lifeledger-account-operations-auth
  DocumentStorageMode:
    Type: String
    Default: s3
    AllowedValues:
      - disabled
      - local
      - s3
  DocumentsUploadBucketName:
    Type: String
    Default: ""
  DocumentsCleanBucketName:
    Type: String
    Default: ""
  AccountExportsBucketName:
    Type: String
    Default: ""
  AppVersion:
    Type: String
    Default: "0.1.0"
  GitCommit:
    Type: String
    Default: "unknown"
  BuildTimestamp:
    Type: String
    Default: "unknown"
  MalwareProtectionEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  AttachmentMaxSizeBytes:
    Type: Number
    Default: 10485760
  AttachmentMaxPerRecord:
    Type: Number
    Default: 5
  GoogleClientId:
    Type: String
    Default: ""
  GoogleOAuthSecretArn:
    Type: String
    Default: ""
  GoogleOAuthRedirectUri:
    Type: String
    Default: ""
  GoogleCalendarScopes:
    Type: String
    Default: "https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.calendarlist.readonly"
  VapidPublicKey:
    Type: String
    Default: ""
  PushSecretArn:
    Type: String
    Default: ""
  VapidSubject:
    Type: String
    Default: ""
  RecordEncryptionMode:
    Type: String
    Default: kms
    AllowedValues:
      - disabled
      - local
      - kms
  CorsAllowedOrigins:
    Type: String
    Default: https://lifeledger.jpreinold.com,https://www.lifeledger.jpreinold.com

Rules:
  ProductionSecurityControls:
    RuleCondition: !Equals [!Ref AppEnv, production]
    Assertions:
      - Assert: !Equals [!Ref AuthMode, cognito]
        AssertDescription: Production requires Cognito authentication.
      - Assert: !Equals [!Ref PersistenceMode, dynamodb]
        AssertDescription: Production requires DynamoDB persistence.
      - Assert: !Equals [!Ref RecordEncryptionMode, kms]
        AssertDescription: Production requires KMS protected-record encryption.
      - Assert: !Equals [!Ref DocumentStorageMode, s3]
        AssertDescription: Production requires encrypted S3 document storage.
      - Assert: !Equals [!Ref MalwareProtectionEnabled, "true"]
        AssertDescription: Production requires document malware protection.

Conditions:
  HasGoogleOAuthSecretArn: !Not [!Equals [!Ref GoogleOAuthSecretArn, ""]]
  HasPushSecretArn: !Not [!Equals [!Ref PushSecretArn, ""]]
  HasDocumentsUploadBucketName: !Not [!Equals [!Ref DocumentsUploadBucketName, ""]]
  HasDocumentsCleanBucketName: !Not [!Equals [!Ref DocumentsCleanBucketName, ""]]
  HasAccountExportsBucketName: !Not [!Equals [!Ref AccountExportsBucketName, ""]]
  EnableMalwareProtection: !Equals [!Ref MalwareProtectionEnabled, "true"]

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 512

Resources:
  LifeLedgerDataEncryptionKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: LifeLedger protected records and integration token encryption
      EnableKeyRotation: true
      PendingWindowInDays: 30
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  LifeLedgerDataEncryptionAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-data"
      TargetKeyId: !Ref LifeLedgerDataEncryptionKey

  LifeLedgerDocumentsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: LifeLedger secure document storage encryption
      EnableKeyRotation: true
      PendingWindowInDays: 30
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  LifeLedgerDocumentsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-documents"
      TargetKeyId: !Ref LifeLedgerDocumentsKey

  DocumentsQuarantineBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasDocumentsUploadBucketName, !Ref DocumentsUploadBucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt LifeLedgerDocumentsKey.Arn
            BucketKeyEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !Split [",", !Ref CorsAllowedOrigins]
            AllowedMethods:
              - POST
            AllowedHeaders:
              - Content-Type
              - x-amz-server-side-encryption
              - x-amz-server-side-encryption-aws-kms-key-id
            ExposedHeaders:
              - ETag
            MaxAge: 300
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAbandonedQuarantineUploads
            Status: Enabled
            Prefix: quarantine/
            ExpirationInDays: 1
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  DocumentsCleanBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasDocumentsCleanBucketName, !Ref DocumentsCleanBucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt LifeLedgerDocumentsKey.Arn
            BucketKeyEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !Split [",", !Ref CorsAllowedOrigins]
            AllowedMethods:
              - GET
              - HEAD
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - Content-Length
              - Content-Type
              - Content-Disposition
              - ETag
            MaxAge: 300

  DocumentsQuarantineBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentsQuarantineBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt DocumentsQuarantineBucket.Arn
              - !Sub "${DocumentsQuarantineBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: DenyUnapprovedObjectEncryption
            Effect: Deny
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "${DocumentsQuarantineBucket.Arn}/quarantine/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: aws:kms
          - Sid: DenyUnapprovedKmsKey
            Effect: Deny
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "${DocumentsQuarantineBucket.Arn}/quarantine/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption-aws-kms-key-id: !GetAtt LifeLedgerDocumentsKey.Arn

  DocumentsCleanBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentsCleanBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt DocumentsCleanBucket.Arn
              - !Sub "${DocumentsCleanBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: DenyUnapprovedObjectEncryption
            Effect: Deny
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "${DocumentsCleanBucket.Arn}/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: aws:kms
          - Sid: DenyUnapprovedKmsKey
            Effect: Deny
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "${DocumentsCleanBucket.Arn}/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption-aws-kms-key-id: !GetAtt LifeLedgerDocumentsKey.Arn

  AccountExportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasAccountExportsBucketName, !Ref AccountExportsBucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt LifeLedgerDocumentsKey.Arn
            BucketKeyEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAccountExports
            Status: Enabled
            Prefix: exports/
            ExpirationInDays: 1
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  AccountExportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccountExportsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt AccountExportsBucket.Arn
              - !Sub "${AccountExportsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: DenyUnapprovedObjectEncryption
            Effect: Deny
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "${AccountExportsBucket.Arn}/exports/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: aws:kms

  LifeLedgerUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true

  LifeLedgerUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-web-client"
      UserPoolId: !Ref LifeLedgerUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO

  LifeLedgerHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref CorsAllowedOrigins]
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - Idempotency-Key
          - X-Correlation-ID
        AllowCredentials: true
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${LifeLedgerUserPool}"
              audience:
                - !Ref LifeLedgerUserPoolClient

  AccountOperationsDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  AccountOperationsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 360
      MessageRetentionPeriod: 345600
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AccountOperationsDeadLetterQueue.Arn
        maxReceiveCount: 5

  LifeLedgerApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      CodeUri: .
      Handler: lambda_handler.handler
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          APP_COMPONENT: api
          AUTH_MODE: !Ref AuthMode
          COGNITO_USER_POOL_ID: !Ref LifeLedgerUserPool
          COGNITO_USER_POOL_CLIENT_ID: !Ref LifeLedgerUserPoolClient
          LOCAL_DEV_USER_ID: !Ref LocalDevUserId
          PERSISTENCE_MODE: !Ref PersistenceMode
          REMINDERS_TABLE_NAME: !Ref RemindersTable
          RECORDS_TABLE_NAME: !Ref RecordsTable
          RECORD_ATTACHMENTS_TABLE_NAME: !Ref RecordAttachmentsTable
          LINKED_ITEMS_TABLE_NAME: !Ref LinkedItemsTable
          SEARCH_INDEX_TABLE_NAME: !Ref SearchIndexTable
          SAVED_VIEWS_TABLE_NAME: !Ref SavedViewsTable
          RESPONSIBILITY_HISTORY_TABLE_NAME: !Ref ResponsibilityHistoryTable
          RECONCILIATION_TABLE_NAME: !Ref ReconciliationTable
          ACCOUNT_OPERATIONS_TABLE_NAME: !Ref AccountOperationsTable
          PREFERENCES_TABLE_NAME: !Ref PreferencesTable
          PUSH_SUBSCRIPTIONS_TABLE_NAME: !Ref PushSubscriptionsTable
          GOOGLE_CALENDAR_CONNECTIONS_TABLE_NAME: !Ref GoogleCalendarConnectionsTable
          GOOGLE_OAUTH_STATES_TABLE_NAME: !Ref GoogleOAuthStatesTable
          LOCAL_DATA_FILE: /tmp/lifeledger-reminders.json
          LOCAL_RECORDS_FILE: /tmp/lifeledger-records.json
          LOCAL_RECORD_ATTACHMENTS_FILE: /tmp/lifeledger-record-attachments.json
          LOCAL_LINKED_ITEMS_FILE: /tmp/lifeledger-linked-items.json
          LOCAL_SEARCH_INDEX_FILE: /tmp/lifeledger-search-index.json
          LOCAL_SAVED_VIEWS_FILE: /tmp/lifeledger-saved-views.json
          LOCAL_RESPONSIBILITY_HISTORY_FILE: /tmp/lifeledger-responsibility-history.json
          LOCAL_RECONCILIATION_FILE: /tmp/lifeledger-reconciliation.json
          LOCAL_ACCOUNT_OPERATIONS_FILE: /tmp/lifeledger-account-operations.json
          LOCAL_PREFERENCES_FILE: /tmp/lifeledger-preferences.json
          LOCAL_PUSH_SUBSCRIPTIONS_FILE: /tmp/lifeledger-push-subscriptions.json
          LOCAL_GOOGLE_CALENDAR_CONNECTIONS_FILE: /tmp/lifeledger-google-calendar-connections.json
          LOCAL_GOOGLE_OAUTH_STATES_FILE: /tmp/lifeledger-google-oauth-states.json
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_OAUTH_SECRET_ARN: !Ref GoogleOAuthSecretArn
          GOOGLE_OAUTH_REDIRECT_URI: !Ref GoogleOAuthRedirectUri
          GOOGLE_CALENDAR_SCOPES: !Ref GoogleCalendarScopes
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          PUSH_SECRET_ARN: !Ref PushSecretArn
          VAPID_SUBJECT: !Ref VapidSubject
          DATA_ENCRYPTION_KMS_KEY_ARN: !GetAtt LifeLedgerDataEncryptionKey.Arn
          RECORD_ENCRYPTION_MODE: !Ref RecordEncryptionMode
          DOCUMENT_STORAGE_MODE: !Ref DocumentStorageMode
          DOCUMENTS_QUARANTINE_BUCKET: !Ref DocumentsQuarantineBucket
          DOCUMENTS_CLEAN_BUCKET: !Ref DocumentsCleanBucket
          DOCUMENTS_KMS_KEY_ARN: !GetAtt LifeLedgerDocumentsKey.Arn
          ACCOUNT_EXPORTS_BUCKET: !Ref AccountExportsBucket
          ACCOUNT_OPERATIONS_QUEUE_URL: !Ref AccountOperationsQueue
          APP_VERSION: !Ref AppVersion
          GIT_COMMIT: !Ref GitCommit
          BUILD_TIMESTAMP: !Ref BuildTimestamp
          ATTACHMENT_MAX_SIZE_BYTES: !Ref AttachmentMaxSizeBytes
          ATTACHMENT_MAX_PER_RECORD: !Ref AttachmentMaxPerRecord
          ALLOW_PLAINTEXT_PRODUCTION_SECRETS: "false"
          CORS_ALLOWED_ORIGINS: !Ref CorsAllowedOrigins
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RemindersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordAttachmentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LinkedItemsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SearchIndexTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SavedViewsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ResponsibilityHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReconciliationTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountOperationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PreferencesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PushSubscriptionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GoogleCalendarConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GoogleOAuthStatesTable
        - Statement:
            - Effect: Allow
              Action:
                - kms:GenerateDataKey
                - kms:Decrypt
              Resource: !GetAtt LifeLedgerDataEncryptionKey.Arn
              Condition:
                StringEquals:
                  kms:EncryptionContext:app: lifeledger
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
                - s3:GetObjectTagging
              Resource: !Sub "${DocumentsQuarantineBucket.Arn}/quarantine/*"
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
                - s3:PutObjectTagging
              Resource: !Sub "${DocumentsCleanBucket.Arn}/clean/*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub "${AccountExportsBucket.Arn}/exports/*"
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:ReEncrypt*
                - kms:GenerateDataKey*
                - kms:DescribeKey
              Resource: !GetAtt LifeLedgerDocumentsKey.Arn
              Condition:
                StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
                StringLike:
                  kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"
        - Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:ReEncrypt*
                - kms:GenerateDataKey*
                - kms:DescribeKey
              Resource: !GetAtt LifeLedgerDataEncryptionKey.Arn
              Condition:
                StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
                StringLike:
                  kms:ViaService: dynamodb.*.amazonaws.com
            - Effect: Allow
              Action:
                - kms:CreateGrant
              Resource: !GetAtt LifeLedgerDataEncryptionKey.Arn
              Condition:
                StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
                StringLike:
                  kms:ViaService: dynamodb.*.amazonaws.com
                Bool:
                  kms:GrantIsForAWSResource: true
        - !If
          - HasGoogleOAuthSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref GoogleOAuthSecretArn
          - !Ref AWS::NoValue
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AccountOperationsQueue.QueueName
        - !If
          - HasPushSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref PushSecretArn
          - !Ref AWS::NoValue
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE
        Version:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /version
            Method: GET
            Auth:
              Authorizer: NONE
        OptionsProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /{proxy+}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /{proxy+}
            Method: ANY

  LifeLedgerDigestPushFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-digest-push"
      CodeUri: .
      Handler: digest_push_handler.handler
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          APP_COMPONENT: digest
          AUTH_MODE: !Ref AuthMode
          COGNITO_USER_POOL_ID: !Ref LifeLedgerUserPool
          COGNITO_USER_POOL_CLIENT_ID: !Ref LifeLedgerUserPoolClient
          LOCAL_DEV_USER_ID: !Ref LocalDevUserId
          PERSISTENCE_MODE: !Ref PersistenceMode
          REMINDERS_TABLE_NAME: !Ref RemindersTable
          RECORDS_TABLE_NAME: !Ref RecordsTable
          PREFERENCES_TABLE_NAME: !Ref PreferencesTable
          PUSH_SUBSCRIPTIONS_TABLE_NAME: !Ref PushSubscriptionsTable
          ACCOUNT_OPERATIONS_TABLE_NAME: !Ref AccountOperationsTable
          LOCAL_DATA_FILE: /tmp/lifeledger-reminders.json
          LOCAL_RECORDS_FILE: /tmp/lifeledger-records.json
          LOCAL_PREFERENCES_FILE: /tmp/lifeledger-preferences.json
          LOCAL_PUSH_SUBSCRIPTIONS_FILE: /tmp/lifeledger-push-subscriptions.json
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          PUSH_SECRET_ARN: !Ref PushSecretArn
          VAPID_SUBJECT: !Ref VapidSubject
          ALLOW_PLAINTEXT_PRODUCTION_SECRETS: "false"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RemindersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PreferencesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PushSubscriptionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref AccountOperationsTable
        - Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:ReEncrypt*
                - kms:GenerateDataKey*
                - kms:DescribeKey
              Resource: !GetAtt LifeLedgerDataEncryptionKey.Arn
              Condition:
                StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
                StringLike:
                  kms:ViaService: dynamodb.*.amazonaws.com
            - Effect: Allow
              Action:
                - kms:CreateGrant
              Resource: !GetAtt LifeLedgerDataEncryptionKey.Arn
              Condition:
                StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
                StringLike:
                  kms:ViaService: dynamodb.*.amazonaws.com
                Bool:
                  kms:GrantIsForAWSResource: true
        - !If
          - HasPushSecretArn
          - Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref PushSecretArn
          - !Ref AWS::NoValue
      Events:
        DailyDigestSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Enabled: true

  LifeLedgerAccountWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-account-worker"
      CodeUri: .
      Handler: account_worker.handler
      Timeout: 300
      MemorySize: 1024
      EphemeralStorage:
        Size: 2048
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          APP_COMPONENT: account_worker
          AUTH_MODE: !Ref AuthMode
          COGNITO_USER_POOL_ID: !Ref LifeLedgerUserPool
          COGNITO_USER_POOL_CLIENT_ID: !Ref LifeLedgerUserPoolClient
          PERSISTENCE_MODE: !Ref PersistenceMode
          REMINDERS_TABLE_NAME: !Ref RemindersTable
          RECORDS_TABLE_NAME: !Ref RecordsTable
          RECORD_ATTACHMENTS_TABLE_NAME: !Ref RecordAttachmentsTable
          LINKED_ITEMS_TABLE_NAME: !Ref LinkedItemsTable
          SEARCH_INDEX_TABLE_NAME: !Ref SearchIndexTable
          SAVED_VIEWS_TABLE_NAME: !Ref SavedViewsTable
          RESPONSIBILITY_HISTORY_TABLE_NAME: !Ref ResponsibilityHistoryTable
          RECONCILIATION_TABLE_NAME: !Ref ReconciliationTable
          ACCOUNT_OPERATIONS_TABLE_NAME: !Ref AccountOperationsTable
          PREFERENCES_TABLE_NAME: !Ref PreferencesTable
          PUSH_SUBSCRIPTIONS_TABLE_NAME: !Ref PushSubscriptionsTable
          GOOGLE_CALENDAR_CONNECTIONS_TABLE_NAME: !Ref GoogleCalendarConnectionsTable
          GOOGLE_OAUTH_STATES_TABLE_NAME: !Ref GoogleOAuthStatesTable
          DATA_ENCRYPTION_KMS_KEY_ARN: !GetAtt LifeLedgerDataEncryptionKey.Arn
          RECORD_ENCRYPTION_MODE: !Ref RecordEncryptionMode
          DOCUMENT_STORAGE_MODE: !Ref DocumentStorageMode
          DOCUMENTS_QUARANTINE_BUCKET: !Ref DocumentsQuarantineBucket
          DOCUMENTS_CLEAN_BUCKET: !Ref DocumentsCleanBucket
          DOCUMENTS_KMS_KEY_ARN: !GetAtt LifeLedgerDocumentsKey.Arn
          ACCOUNT_EXPORTS_BUCKET: !Ref AccountExportsBucket
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_OAUTH_SECRET_ARN: !Ref GoogleOAuthSecretArn
          GOOGLE_OAUTH_REDIRECT_URI: !Ref GoogleOAuthRedirectUri
          ALLOW_PLAINTEXT_PRODUCTION_SECRETS: "false"
          APP_VERSION: !Ref AppVersion
          GIT_COMMIT: !Ref GitCommit
          BUILD_TIMESTAMP: !Ref BuildTimestamp
      Policies: &AccountOperationsPolicies
        - DynamoDBCrudPolicy: {TableName: !Ref RemindersTable}
        - DynamoDBCrudPolicy: {TableName: !Ref RecordsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref RecordAttachmentsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref LinkedItemsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref SearchIndexTable}
        - DynamoDBCrudPolicy: {TableName: !Ref SavedViewsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref ResponsibilityHistoryTable}
        - DynamoDBCrudPolicy: {TableName: !Ref ReconciliationTable}
        - DynamoDBCrudPolicy: {TableName: !Ref AccountOperationsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref PreferencesTable}
        - DynamoDBCrudPolicy: {TableName: !Ref PushSubscriptionsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref GoogleCalendarConnectionsTable}
        - DynamoDBCrudPolicy: {TableName: !Ref GoogleOAuthStatesTable}
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource:
                - !Sub "${DocumentsQuarantineBucket.Arn}/quarantine/*"
                - !Sub "${DocumentsCleanBucket.Arn}/clean/*"
                - !Sub "${AccountExportsBucket.Arn}/exports/*"
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - !GetAtt DocumentsQuarantineBucket.Arn
                - !GetAtt DocumentsCleanBucket.Arn
                - !GetAtt AccountExportsBucket.Arn
              Condition:
                StringLike:
                  s3:prefix:
                    - quarantine/*
                    - clean/*
                    - exports/*
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:ReEncrypt*
                - kms:GenerateDataKey*
                - kms:DescribeKey
              Resource:
                - !GetAtt LifeLedgerDataEncryptionKey.Arn
                - !GetAtt LifeLedgerDocumentsKey.Arn
            - Effect: Allow
              Action:
                - cognito-idp:AdminDeleteUser
                - cognito-idp:ListUsers
              Resource: !GetAtt LifeLedgerUserPool.Arn
      Events:
        AccountOperations:
          Type: SQS
          Properties:
            Queue: !GetAtt AccountOperationsQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  LifeLedgerReconciliationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-reconciliation"
      CodeUri: .
      Handler: reconciliation_handler.handler
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          APP_COMPONENT: reconciliation
          AUTH_MODE: !Ref AuthMode
          COGNITO_USER_POOL_ID: !Ref LifeLedgerUserPool
          COGNITO_USER_POOL_CLIENT_ID: !Ref LifeLedgerUserPoolClient
          PERSISTENCE_MODE: !Ref PersistenceMode
          REMINDERS_TABLE_NAME: !Ref RemindersTable
          RECORDS_TABLE_NAME: !Ref RecordsTable
          RECORD_ATTACHMENTS_TABLE_NAME: !Ref RecordAttachmentsTable
          LINKED_ITEMS_TABLE_NAME: !Ref LinkedItemsTable
          SEARCH_INDEX_TABLE_NAME: !Ref SearchIndexTable
          SAVED_VIEWS_TABLE_NAME: !Ref SavedViewsTable
          RESPONSIBILITY_HISTORY_TABLE_NAME: !Ref ResponsibilityHistoryTable
          RECONCILIATION_TABLE_NAME: !Ref ReconciliationTable
          ACCOUNT_OPERATIONS_TABLE_NAME: !Ref AccountOperationsTable
          PREFERENCES_TABLE_NAME: !Ref PreferencesTable
          PUSH_SUBSCRIPTIONS_TABLE_NAME: !Ref PushSubscriptionsTable
          GOOGLE_CALENDAR_CONNECTIONS_TABLE_NAME: !Ref GoogleCalendarConnectionsTable
          GOOGLE_OAUTH_STATES_TABLE_NAME: !Ref GoogleOAuthStatesTable
          DATA_ENCRYPTION_KMS_KEY_ARN: !GetAtt LifeLedgerDataEncryptionKey.Arn
          RECORD_ENCRYPTION_MODE: !Ref RecordEncryptionMode
          DOCUMENT_STORAGE_MODE: !Ref DocumentStorageMode
          DOCUMENTS_QUARANTINE_BUCKET: !Ref DocumentsQuarantineBucket
          DOCUMENTS_CLEAN_BUCKET: !Ref DocumentsCleanBucket
          DOCUMENTS_KMS_KEY_ARN: !GetAtt LifeLedgerDocumentsKey.Arn
          ACCOUNT_EXPORTS_BUCKET: !Ref AccountExportsBucket
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_OAUTH_SECRET_ARN: !Ref GoogleOAuthSecretArn
          GOOGLE_OAUTH_REDIRECT_URI: !Ref GoogleOAuthRedirectUri
          ALLOW_PLAINTEXT_PRODUCTION_SECRETS: "false"
          APP_VERSION: !Ref AppVersion
          GIT_COMMIT: !Ref GitCommit
          BUILD_TIMESTAMP: !Ref BuildTimestamp
      Policies: *AccountOperationsPolicies
      Events:
        RetrySchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Enabled: true
            Input: '{"limit":25}'
        ExportCleanupSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Enabled: true
            Input: '{"limit":25,"mode":"export_cleanup"}'
        DeepSweepSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(20 5 * * ? *)
            Enabled: true
            Input: '{"mode":"deep","limit":100}'

  ReconciliationTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref ReconciliationTableName
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt LifeLedgerDataEncryptionKey.Arn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      AttributeDefinitions:
        - AttributeName: reconciliation_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: domain
          AttributeType: S
        - AttributeName: detected_at
          AttributeType: S
        - AttributeName: due_partition
          AttributeType: S
        - AttributeName: due_at
          AttributeType: S
      KeySchema:
        - AttributeName: reconciliation_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: detected_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: user-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: detected_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: domain-index
          KeySchema:
            - AttributeName: domain
              KeyType: HASH
            - AttributeName: detected_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: due-index
          KeySchema:
            - AttributeName: due_partition
              KeyType: HASH
            - AttributeName: due_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

