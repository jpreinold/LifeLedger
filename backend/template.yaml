  GuardDutyDocumentsMalwareProtectionRole:
    Type: AWS::IAM::Role
    Condition: EnableMalwareProtection
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: malware-protection-plan.guardduty.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GuardDutyDocumentsMalwareProtectionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowManagedRuleToSendS3EventsToGuardDuty
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:DeleteRule
                  - events:PutTargets
                  - events:RemoveTargets
                Resource: !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/DO-NOT-DELETE-AmazonGuardDutyMalwareProtectionS3*"
                Condition:
                  StringLike:
                    events:ManagedBy: malware-protection-plan.guardduty.amazonaws.com
              - Sid: AllowGuardDutyToMonitorEventBridgeManagedRule
                Effect: Allow
                Action:
                  - events:DescribeRule
                  - events:ListTargetsByRule
                Resource: !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/DO-NOT-DELETE-AmazonGuardDutyMalwareProtectionS3*"
              - Sid: AllowPostScanTag
                Effect: Allow
                Action:
                  - s3:PutObjectTagging
                  - s3:GetObjectTagging
                  - s3:PutObjectVersionTagging
                  - s3:GetObjectVersionTagging
                Resource: !Sub "${DocumentsQuarantineBucket.Arn}/quarantine/*"
              - Sid: AllowEnableS3EventBridgeEvents
                Effect: Allow
                Action:
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                Resource: !GetAtt DocumentsQuarantineBucket.Arn
              - Sid: AllowPutValidationObject
                Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${DocumentsQuarantineBucket.Arn}/malware-protection-resource-validation-object"
              - Sid: AllowCheckBucketOwnership
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt DocumentsQuarantineBucket.Arn
              - Sid: AllowMalwareScan
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "${DocumentsQuarantineBucket.Arn}/quarantine/*"
              - Sid: AllowDecryptForMalwareScan
                Effect: Allow
                Action:
                  - kms:GenerateDataKey
                  - kms:Decrypt
                Resource: !GetAtt LifeLedgerDocumentsKey.Arn
                Condition:
                  StringLike:
                    kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"

  DocumentsMalwareProtectionPlan:
    Type: AWS::GuardDuty::MalwareProtectionPlan
    Condition: EnableMalwareProtection
    Properties:
      Role: !GetAtt GuardDutyDocumentsMalwareProtectionRole.Arn
      ProtectedResource:
        S3Bucket:
          BucketName: !Ref DocumentsQuarantineBucket
          ObjectPrefixes:
            - quarantine/
      Actions:
        Tagging:
          Status: ENABLED
      Tags:
        - Key: Application
          Value: LifeLedger

  LifeLedgerAttachmentScanFinalizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-attachment-scan-finalizer"
      CodeUri: .
      Handler: attachment_scan_finalizer.handler
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          APP_COMPONENT: attachment_finalizer
          AUTH_MODE: !Ref AuthMode
          COGNITO_USER_POOL_ID: !Ref LifeLedgerUserPool
          COGNITO_USER_POOL_CLIENT_ID: !Ref LifeLedgerUserPoolClient
          LOCAL_DEV_USER_ID: !Ref LocalDevUserId
          PERSISTENCE_MODE: !Ref PersistenceMode
          REMINDERS_TABLE_NAME: !Ref RemindersTable
          RECORDS_TABLE_NAME: !Ref RecordsTable
          RECORD_ATTACHMENTS_TABLE_NAME: !Ref RecordAttachmentsTable
          LINKED_ITEMS_TABLE_NAME: !Ref LinkedItemsTable
          SEARCH_INDEX_TABLE_NAME: !Ref SearchIndexTable
          LOCAL_DATA_FILE: /tmp/lifeledger-reminders.json
          LOCAL_RECORDS_FILE: /tmp/lifeledger-records.json
          LOCAL_RECORD_ATTACHMENTS_FILE: /tmp/lifeledger-record-attachments.json
          LOCAL_LINKED_ITEMS_FILE: /tmp/lifeledger-linked-items.json
          LOCAL_SEARCH_INDEX_FILE: /tmp/lifeledger-search-index.json
          DOCUMENT_STORAGE_MODE: !Ref DocumentStorageMode
          DOCUMENTS_QUARANTINE_BUCKET: !Ref DocumentsQuarantineBucket
          DOCUMENTS_CLEAN_BUCKET: !Ref DocumentsCleanBucket
          DOCUMENTS_KMS_KEY_ARN: !GetAtt LifeLedgerDocumentsKey.Arn
          ATTACHMENT_MAX_SIZE_BYTES: !Ref AttachmentMaxSizeBytes
          ATTACHMENT_MAX_PER_RECORD: !Ref AttachmentMaxPerRecord
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RemindersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordAttachmentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LinkedItemsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SearchIndexTable
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:DeleteObject
                - s3:GetObjectTagging
              Resource: !Sub "${DocumentsQuarantineBucket.Arn}/quarantine/*"
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
                - s3:PutObjectTagging
              Resource: !Sub "${DocumentsCleanBucket.Arn}/clean/*"
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:ReEncrypt*
                - kms:GenerateDataKey*
                - kms:DescribeKey
              Resource: !GetAtt LifeLedgerDocumentsKey.Arn
              Condition:
                StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
                StringLike:
                  kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"
        - Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:ReEncrypt*
                - kms:GenerateDataKey*
                - kms:DescribeKey
              Resource: !GetAtt LifeLedgerDataEncryptionKey.Arn
              Condition:
                StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
                StringLike:
                  kms:ViaService: dynamodb.*.amazonaws.com
            - Effect: Allow
              Action:
                - kms:CreateGrant
              Resource: !GetAtt LifeLedgerDataEncryptionKey.Arn
              Condition:
                StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
                StringLike:
                  kms:ViaService: dynamodb.*.amazonaws.com
                Bool:
                  kms:GrantIsForAWSResource: true

  AttachmentScanResultRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.guardduty
        detail-type:
          - GuardDuty Malware Protection Object Scan Result
        detail:
          resourceType:
            - S3_OBJECT
          s3ObjectDetails:
            bucketName:
              - !Ref DocumentsQuarantineBucket
      State: ENABLED
      Targets:
        - Arn: !GetAtt LifeLedgerAttachmentScanFinalizerFunction.Arn
          Id: LifeLedgerAttachmentScanFinalizer

  AttachmentScanResultInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LifeLedgerAttachmentScanFinalizerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AttachmentScanResultRule.Arn

  ReconciliationFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scheduled reconciliation Lambda errors require operator review.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LifeLedgerReconciliationFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  RequiresAttentionAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Reconciliation work has required attention for at least two hourly passes.
      Namespace: LifeLedger/Operations
      MetricName: RequiresAttentionCount
      Dimensions:
        - Name: Environment
          Value: !Ref AppEnv
      Statistic: Maximum
      Period: 3600
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  OldUnresolvedReconciliationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: The oldest unresolved issue has remained open for more than 24 hours.
      Namespace: LifeLedger/Operations
      MetricName: OldestUnresolvedAgeSeconds
      Dimensions:
        - Name: Environment
          Value: !Ref AppEnv
      Statistic: Maximum
      Period: 3600
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 86400
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  DocumentScanningBacklogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Five or more documents have remained in scanning beyond the safe threshold.
      Namespace: LifeLedger/Operations
      MetricName: DocumentStuckScanningCount
      Dimensions:
        - Name: Environment
          Value: !Ref AppEnv
      Statistic: Maximum
      Period: 3600
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  AccountDeletionIncompleteAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Account deletion remains incomplete across two reconciliation passes.
      Namespace: LifeLedger/Operations
      MetricName: AccountDeletionIncompleteCount
      Dimensions:
        - Name: Environment
          Value: !Ref AppEnv
      Statistic: Maximum
      Period: 3600
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  AccountOperationsDeadLetterAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Account export or deletion messages reached the dead-letter queue.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AccountOperationsDeadLetterQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ProductionE2ERepeatedFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: The explicitly triggered production acceptance path failed twice in two days.
      Namespace: LifeLedger/Operations
      MetricName: ProductionE2EFailure
      Dimensions:
        - Name: Environment
          Value: !Ref AppEnv
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  OperationsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AWS::StackName}-operations"
      DashboardBody: !Sub |
        {"widgets":[{"type":"metric","width":24,"height":6,"properties":{"title":"LifeLedger reconciliation health","region":"${AWS::Region}","view":"timeSeries","stacked":false,"metrics":[["LifeLedger/Operations","PendingReconciliationCount","Environment","${AppEnv}"],[".","RetryingReconciliationCount",".","."],[".","RequiresAttentionCount",".","."],[".","DocumentStuckScanningCount",".","."],[".","AccountDeletionIncompleteCount",".","."]]}}]}

Outputs:
  DataEncryptionKeyArn:
    Description: KMS key ARN for LifeLedger application-level and DynamoDB encryption.
    Value: !GetAtt LifeLedgerDataEncryptionKey.Arn
  DataEncryptionKeyAlias:
    Description: KMS alias for LifeLedger application data encryption.
    Value: !Ref LifeLedgerDataEncryptionAlias
  DocumentsKeyArn:
    Description: KMS key ARN for LifeLedger secure document storage.
    Value: !GetAtt LifeLedgerDocumentsKey.Arn
  DocumentsKeyAlias:
    Description: KMS alias for LifeLedger secure document storage.
    Value: !Ref LifeLedgerDocumentsKeyAlias
  DocumentsQuarantineBucketName:
    Description: Private S3 bucket for untrusted quarantined document uploads.
    Value: !Ref DocumentsQuarantineBucket
  DocumentsCleanBucketName:
    Description: Private S3 bucket for scanned and validated record attachments.
    Value: !Ref DocumentsCleanBucket
  AccountExportsBucketName:
    Description: Private short-lived account export bucket.
    Value: !Ref AccountExportsBucket
  ReconciliationTableName:
    Description: Durable operational reconciliation issue table.
    Value: !Ref ReconciliationTable
  AccountOperationsTableName:
    Description: Resumable account export and deletion operation table.
    Value: !Ref AccountOperationsTable
  ReconciliationFunctionName:
    Description: Scheduled reconciliation Lambda function.
    Value: !Ref LifeLedgerReconciliationFunction
  RecordAttachmentsTableName:
    Description: DynamoDB record attachments metadata table name.
    Value: !Ref RecordAttachmentsTable
  MalwareProtectionPlanId:
    Description: GuardDuty Malware Protection plan ID when enabled.
    Value: !If [EnableMalwareProtection, !GetAtt DocumentsMalwareProtectionPlan.MalwareProtectionPlanId, "disabled"]
  ApiUrl:
    Description: HTTP API endpoint for the LifeLedger backend.
    Value: !Sub "https://${LifeLedgerHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  RemindersTable:
    Description: DynamoDB reminders table name.
    Value: !Ref RemindersTable
  RecordsTable:
    Description: DynamoDB records table name.
    Value: !Ref RecordsTable
  PreferencesTable:
    Description: DynamoDB user preferences table name.
    Value: !Ref PreferencesTable
  LinkedItemsTable:
    Description: DynamoDB linked items table name.
    Value: !Ref LinkedItemsTable
  SearchIndexTable:
    Description: DynamoDB unified search index table name.
    Value: !Ref SearchIndexTable
  SavedViewsTable:
    Description: DynamoDB saved search views table name.
    Value: !Ref SavedViewsTable
  ResponsibilityHistoryTable:
    Description: DynamoDB responsibility lifecycle history table name.
    Value: !Ref ResponsibilityHistoryTable
  PushSubscriptionsTable:
    Description: DynamoDB push subscriptions table name.
    Value: !Ref PushSubscriptionsTable
  GoogleCalendarConnectionsTable:
    Description: DynamoDB Google Calendar connections table name.
    Value: !Ref GoogleCalendarConnectionsTable
  GoogleOAuthStatesTable:
    Description: DynamoDB Google OAuth states table name.
    Value: !Ref GoogleOAuthStatesTable
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !Ref LifeLedgerUserPool
  UserPoolClientId:
    Description: Cognito User Pool app client ID for the frontend.
    Value: !Ref LifeLedgerUserPoolClient

