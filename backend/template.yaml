AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: LifeLedger FastAPI backend running on AWS Lambda with local or DynamoDB persistence.

Parameters:
  AppEnv:
    Type: String
    Default: local
    AllowedValues:
      - local
      - production
  AuthMode:
    Type: String
    Default: local
    AllowedValues:
      - local
      - cognito
  LocalDevUserId:
    Type: String
    Default: local-dev-user
  PersistenceMode:
    Type: String
    Default: local
    AllowedValues:
      - local
      - dynamodb
  RemindersTableName:
    Type: String
    Default: lifeledger-reminders-auth
  PreferencesTableName:
    Type: String
    Default: lifeledger-preferences-auth
  PushSubscriptionsTableName:
    Type: String
    Default: lifeledger-push-subscriptions-auth
  GoogleCalendarConnectionsTableName:
    Type: String
    Default: lifeledger-google-calendar-connections-auth
  GoogleOAuthStatesTableName:
    Type: String
    Default: lifeledger-google-oauth-states-auth
  GoogleClientId:
    Type: String
    Default: ""
  GoogleClientSecret:
    Type: String
    Default: ""
    NoEcho: true
  GoogleOAuthRedirectUri:
    Type: String
    Default: ""
  GoogleCalendarScopes:
    Type: String
    Default: "https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.calendarlist.readonly"
  VapidPublicKey:
    Type: String
    Default: ""
  VapidPrivateKey:
    Type: String
    Default: ""
    NoEcho: true
  VapidSubject:
    Type: String
    Default: ""
  CorsAllowedOrigins:
    Type: String
    Default: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,https://lifeledger.jpreinold.com,https://www.lifeledger.jpreinold.com

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 512

Resources:
  LifeLedgerUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true

  LifeLedgerUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-web-client"
      UserPoolId: !Ref LifeLedgerUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO

  LifeLedgerHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref CorsAllowedOrigins]
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowCredentials: true
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${LifeLedgerUserPool}"
              audience:
                - !Ref LifeLedgerUserPoolClient

  LifeLedgerApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      CodeUri: .
      Handler: lambda_handler.handler
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          AUTH_MODE: !Ref AuthMode
          LOCAL_DEV_USER_ID: !Ref LocalDevUserId
          PERSISTENCE_MODE: !Ref PersistenceMode
          REMINDERS_TABLE_NAME: !Ref RemindersTable
          PREFERENCES_TABLE_NAME: !Ref PreferencesTable
          PUSH_SUBSCRIPTIONS_TABLE_NAME: !Ref PushSubscriptionsTable
          GOOGLE_CALENDAR_CONNECTIONS_TABLE_NAME: !Ref GoogleCalendarConnectionsTable
          GOOGLE_OAUTH_STATES_TABLE_NAME: !Ref GoogleOAuthStatesTable
          LOCAL_DATA_FILE: /tmp/lifeledger-reminders.json
          LOCAL_PREFERENCES_FILE: /tmp/lifeledger-preferences.json
          LOCAL_PUSH_SUBSCRIPTIONS_FILE: /tmp/lifeledger-push-subscriptions.json
          LOCAL_GOOGLE_CALENDAR_CONNECTIONS_FILE: /tmp/lifeledger-google-calendar-connections.json
          LOCAL_GOOGLE_OAUTH_STATES_FILE: /tmp/lifeledger-google-oauth-states.json
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_OAUTH_REDIRECT_URI: !Ref GoogleOAuthRedirectUri
          GOOGLE_CALENDAR_SCOPES: !Ref GoogleCalendarScopes
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
          VAPID_SUBJECT: !Ref VapidSubject
          CORS_ALLOWED_ORIGINS: !Ref CorsAllowedOrigins
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RemindersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PreferencesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PushSubscriptionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GoogleCalendarConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GoogleOAuthStatesTable
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE
        OptionsProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /{proxy+}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref LifeLedgerHttpApi
            Path: /{proxy+}
            Method: ANY

  LifeLedgerDigestPushFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-digest-push"
      CodeUri: .
      Handler: digest_push_handler.handler
      Environment:
        Variables:
          APP_ENV: !Ref AppEnv
          AUTH_MODE: !Ref AuthMode
          LOCAL_DEV_USER_ID: !Ref LocalDevUserId
          PERSISTENCE_MODE: !Ref PersistenceMode
          REMINDERS_TABLE_NAME: !Ref RemindersTable
          PREFERENCES_TABLE_NAME: !Ref PreferencesTable
          PUSH_SUBSCRIPTIONS_TABLE_NAME: !Ref PushSubscriptionsTable
          LOCAL_DATA_FILE: /tmp/lifeledger-reminders.json
          LOCAL_PREFERENCES_FILE: /tmp/lifeledger-preferences.json
          LOCAL_PUSH_SUBSCRIPTIONS_FILE: /tmp/lifeledger-push-subscriptions.json
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
          VAPID_SUBJECT: !Ref VapidSubject
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RemindersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PreferencesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PushSubscriptionsTable
      Events:
        DailyDigestSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Enabled: true

  RemindersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref RemindersTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: id
          KeyType: RANGE

  PreferencesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref PreferencesTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  PushSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref PushSubscriptionsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: subscription_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: subscription_id
          KeyType: RANGE

  GoogleCalendarConnectionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref GoogleCalendarConnectionsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  GoogleOAuthStatesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref GoogleOAuthStatesTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: state
          AttributeType: S
      KeySchema:
        - AttributeName: state
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: HTTP API endpoint for the LifeLedger backend.
    Value: !Sub "https://${LifeLedgerHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  RemindersTable:
    Description: DynamoDB reminders table name.
    Value: !Ref RemindersTable
  PreferencesTable:
    Description: DynamoDB user preferences table name.
    Value: !Ref PreferencesTable
  PushSubscriptionsTable:
    Description: DynamoDB push subscriptions table name.
    Value: !Ref PushSubscriptionsTable
  GoogleCalendarConnectionsTable:
    Description: DynamoDB Google Calendar connections table name.
    Value: !Ref GoogleCalendarConnectionsTable
  GoogleOAuthStatesTable:
    Description: DynamoDB Google OAuth states table name.
    Value: !Ref GoogleOAuthStatesTable
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !Ref LifeLedgerUserPool
  UserPoolClientId:
    Description: Cognito User Pool app client ID for the frontend.
    Value: !Ref LifeLedgerUserPoolClient
